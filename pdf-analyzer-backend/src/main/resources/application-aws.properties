# ═══════════════════════════════════════════════════════════════════════════════
#  Smart PDF Analyzer – AWS Production Profile
#
#  WHAT THIS PROFILE DOES:
#    • Connects to Amazon RDS (MySQL) instead of local H2
#    • Stores uploaded files in Amazon S3 instead of local disk
#    • Reads ALL secrets from AWS Systems Manager Parameter Store (SSM)
#      instead of hardcoding them here
#
#  HOW TO DEPLOY:
#  ─────────────────────────────────────────────────────────────────────────────
#  STEP 1 – Create an S3 Bucket
#    aws s3 mb s3://your-pdfanalyzer-bucket --region ap-south-1
#    aws s3api put-bucket-versioning \
#      --bucket your-pdfanalyzer-bucket \
#      --versioning-configuration Status=Enabled
#
#  STEP 2 – Create RDS MySQL instance (Free tier eligible)
#    aws rds create-db-instance \
#      --db-instance-identifier pdfanalyzer-db \
#      --db-instance-class db.t3.micro \
#      --engine mysql \
#      --engine-version 8.0 \
#      --master-username admin \
#      --master-user-password YourRDSPassword123! \
#      --allocated-storage 20 \
#      --db-name pdfanalyzer \
#      --publicly-accessible \
#      --region ap-south-1
#
#  STEP 3 – Store secrets in AWS SSM Parameter Store
#    aws ssm put-parameter --name "/pdfanalyzer/prod/db-password"   --value "YourRDSPassword123!" --type SecureString
#    aws ssm put-parameter --name "/pdfanalyzer/prod/jwt-secret"    --value "$(openssl rand -base64 64)" --type SecureString
#    aws ssm put-parameter --name "/pdfanalyzer/prod/gemini-api-key" --value "AIzaSy..." --type SecureString
#
#  STEP 4 – Set environment variables before running the app
#    export SPRING_PROFILES_ACTIVE=aws
#    export AWS_REGION=ap-south-1
#    export AWS_ACCESS_KEY_ID=AKIA...
#    export AWS_SECRET_ACCESS_KEY=...
#    export DB_HOST=pdfanalyzer-db.xxxxxxxx.ap-south-1.rds.amazonaws.com
#    export DB_USERNAME=admin
#    export S3_BUCKET_NAME=your-pdfanalyzer-bucket
#    # JWT secret and DB password are read from SSM automatically by AwsConfig.java
#
#  STEP 5 – Run
#    java -jar target/pdf-analyzer-backend-1.0.0.jar
#
#  IAM PERMISSIONS needed by the EC2/ECS role or IAM user:
#    s3:PutObject, s3:GetObject, s3:DeleteObject on arn:aws:s3:::your-bucket/*
#    s3:ListBucket on arn:aws:s3:::your-bucket
#    ssm:GetParameter, ssm:GetParameters on arn:aws:ssm:region:account:parameter/pdfanalyzer/*
# ═══════════════════════════════════════════════════════════════════════════════

# ── RDS MySQL ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:pdfanalyzer}?useSSL=true&requireSSL=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
# DB_PASSWORD is injected at runtime from SSM by AwsConfig.java
# DO NOT put a real password here — leave it to the SSM-reading code
spring.datasource.password=${DB_PASSWORD:REPLACED_BY_SSM}

# ── HikariCP – tuned for RDS ──────────────────────────────────────────────────
spring.datasource.hikari.pool-name=PdfAnalyzerRDS-Pool
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# PRODUCTION: use validate + Flyway for schema migrations, never 'create-drop'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── H2 disabled in AWS profile ────────────────────────────────────────────────
spring.h2.console.enabled=false

# ── Storage: S3 ───────────────────────────────────────────────────────────────
app.storage.type=s3
# S3 bucket name – set via env var
cloud.aws.s3.bucket=${S3_BUCKET_NAME}
cloud.aws.region=${AWS_REGION:ap-south-1}
# Optional: custom endpoint for LocalStack testing
# cloud.aws.s3.endpoint=http://localhost:4566

# ── CORS: update with your real frontend domain ───────────────────────────────
app.cors.allowed-origins=https://your-domain.com,https://www.your-domain.com

# ── JWT secret loaded from SSM by AwsConfig.java (not set here) ─────────────
# app.jwt.secret is set programmatically from SSM in AwsConfig.java

# ── Gemini AI key loaded from SSM by AwsConfig.java ──────────────────────────
# ai.gemini.api-key is set programmatically from SSM in AwsConfig.java

# ── Actuator – expose health for load balancer target group checks ────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.pdfanalyzer=INFO
logging.level.org.springframework.security=WARN
logging.level.software.amazon.awssdk=WARN
