# ═══════════════════════════════════════════════════════════════════════════════
#  Smart PDF Analyzer – Default Configuration  (H2 local dev)
#
#  Active profile controls which database + storage backend is used:
#    java -jar app.jar                          → H2  + local disk  (this file)
#    java -jar app.jar --spring.profiles.active=mysql  → MySQL + local disk
#    java -jar app.jar --spring.profiles.active=aws    → MySQL (RDS) + S3
#
#  Or set env var:  SPRING_PROFILES_ACTIVE=mysql
# ═══════════════════════════════════════════════════════════════════════════════

spring.application.name=pdf-analyzer-backend
server.port=8080

# ── H2 (default – no install needed) ──────────────────────────────────────────
spring.datasource.url=jdbc:h2:file:./data/pdfanalyzer;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── File Upload ────────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Storage (local disk – overridden to S3 in aws profile) ────────────────────
app.storage.location=./uploads
# Options: local | s3
app.storage.type=local

# ── JWT ────────────────────────────────────────────────────────────────────────
# IMPORTANT: Change this to a random 256-bit string in production!
# Generate one: openssl rand -base64 64
app.jwt.secret=SuperSecretKeyForPDFAnalyzerApp2024XYZxxxxxxxxxxxxxxxxxxxxx
app.jwt.expiration=86400000

# ── CORS ───────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# ── Google Gemini AI ───────────────────────────────────────────────────────────
# Leave blank to use offline extractive summarization fallback
ai.gemini.api-key=

# ── AWS (not used in default profile – see application-aws.properties) ─────────
cloud.aws.region=ap-south-1
cloud.aws.s3.bucket=
cloud.aws.credentials.access-key=
cloud.aws.credentials.secret-key=

# ── Actuator Health ────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.pdfanalyzer=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
