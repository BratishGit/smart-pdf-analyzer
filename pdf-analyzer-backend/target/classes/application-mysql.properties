# ═══════════════════════════════════════════════════════════════════════════════
#  Smart PDF Analyzer – MySQL Profile
#
#  HOW TO USE:
#    1. Install MySQL 8.x locally (or use Docker):
#         docker run -d --name pdfanalyzer-mysql \
#           -e MYSQL_ROOT_PASSWORD=rootpass \
#           -e MYSQL_DATABASE=pdfanalyzer \
#           -e MYSQL_USER=pdfuser \
#           -e MYSQL_PASSWORD=pdfpass \
#           -p 3306:3306 mysql:8.0
#
#    2. Run the backend with this profile:
#         mvn spring-boot:run -Dspring-boot.run.profiles=mysql
#       OR
#         java -jar target/pdf-analyzer-backend-1.0.0.jar --spring.profiles.active=mysql
#       OR set env var:
#         export SPRING_PROFILES_ACTIVE=mysql
#
#    3. Override credentials via environment variables (recommended):
#         export DB_HOST=localhost
#         export DB_PORT=3306
#         export DB_NAME=pdfanalyzer
#         export DB_USERNAME=pdfuser
#         export DB_PASSWORD=pdfpass
#
#  The schema is auto-created by Hibernate (ddl-auto=update).
#  For production, switch ddl-auto=validate and manage schema with Flyway.
# ═══════════════════════════════════════════════════════════════════════════════

# ── MySQL DataSource ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pdfanalyzer}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:pdfuser}
spring.datasource.password=${DB_PASSWORD:pdfpass}

# ── HikariCP Connection Pool ───────────────────────────────────────────────────
spring.datasource.hikari.pool-name=PdfAnalyzerHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
# Keep-alive for long-idle connections (important for cloud MySQL)
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# update  → Hibernate auto-migrates schema (good for dev/staging)
# validate → Hibernate only checks schema matches entities (use in prod with Flyway)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Required for MySQL: use utf8mb4 for full Unicode support (emojis etc.)
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.jpa.properties.hibernate.connection.useUnicode=true

# ── H2 console disabled in MySQL profile ──────────────────────────────────────
spring.h2.console.enabled=false

# ── Storage: still local disk unless you switch to aws profile ────────────────
app.storage.type=local
app.storage.location=./uploads

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.pdfanalyzer=INFO
logging.level.org.springframework.security=WARN
logging.level.com.zaxxer.hikari=INFO
